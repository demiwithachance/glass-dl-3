name: Build Windows Portable

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  build-windows-portable:
    name: Build Windows portable app
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust packages
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Lock compatible Brotli allocator dependencies
        working-directory: src-tauri
        run: cargo update -p alloc-no-stdlib@3.0.0 --precise 2.0.4

      - name: Generate Windows app icon
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          New-Item -ItemType Directory -Force -Path "src-tauri/icons" | Out-Null

          $bitmap = [System.Drawing.Bitmap]::new(256, 256)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
          $graphics.Clear([System.Drawing.Color]::FromArgb(8, 11, 18))

          $brush = [System.Drawing.Drawing2D.LinearGradientBrush]::new(
            [System.Drawing.Rectangle]::new(28, 28, 200, 200),
            [System.Drawing.Color]::FromArgb(139, 124, 255),
            [System.Drawing.Color]::FromArgb(57, 216, 255),
            45.0
          )
          $graphics.FillEllipse($brush, 28, 28, 200, 200)
          $pen = [System.Drawing.Pen]::new([System.Drawing.Color]::White, 20)
          $pen.StartCap = [System.Drawing.Drawing2D.LineCap]::Round
          $pen.EndCap = [System.Drawing.Drawing2D.LineCap]::Round
          $graphics.DrawLine($pen, 128, 66, 128, 166)
          $graphics.DrawLine($pen, 86, 128, 128, 172)
          $graphics.DrawLine($pen, 170, 128, 128, 172)

          $pngStream = [System.IO.MemoryStream]::new()
          $bitmap.Save($pngStream, [System.Drawing.Imaging.ImageFormat]::Png)
          $png = $pngStream.ToArray()
          $iconStream = [System.IO.File]::Create("src-tauri/icons/icon.ico")
          $writer = [System.IO.BinaryWriter]::new($iconStream)
          $writer.Write([uint16]0)
          $writer.Write([uint16]1)
          $writer.Write([uint16]1)
          $writer.Write([byte]0)
          $writer.Write([byte]0)
          $writer.Write([byte]0)
          $writer.Write([byte]0)
          $writer.Write([uint16]1)
          $writer.Write([uint16]32)
          $writer.Write([uint32]$png.Length)
          $writer.Write([uint32]22)
          $writer.Write($png)
          $writer.Dispose()
          $graphics.Dispose()
          $bitmap.Dispose()

      - name: Build Tauri app
        run: npm run tauri build -- --no-bundle

      - name: Assemble portable folder
        shell: pwsh
        run: |
          $portable = "artifact/Glass-DL-Portable"
          New-Item -ItemType Directory -Force -Path "$portable/tools" | Out-Null
          New-Item -ItemType Directory -Force -Path "$portable/assets/sprites" | Out-Null

          Copy-Item "src-tauri/target/release/glass-dl.exe" "$portable/Glass DL.exe"
          Copy-Item "tools/README.txt" "$portable/tools/README.txt"
          Copy-Item "assets/sprites/README.md" "$portable/assets/sprites/README.md"
          Copy-Item "README.md" "$portable/README.md"

          @"
          Add these files to this tools folder:

          Required:
            yt-dlp.exe

          Recommended:
            ffmpeg.exe
            ffprobe.exe
            deno.exe (optional JavaScript runtime for more complete YouTube formats)

          Open Glass DL.exe after adding the tools.
          "@ | Set-Content "$portable/tools/PLACE-TOOLS-HERE.txt"

      - name: Upload portable Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Glass-DL-Windows-Portable
          path: artifact/Glass-DL-Portable
          if-no-files-found: error
          retention-days: 30
